<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة فيبوناتشي للتحليل الفني</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <h1>حاسبة فيبوناتشي</h1>
        <p>للذهب (XAUUSD) والبيتكوين (BTCUSD) على إطار 15 دقيقة</p>

        <div class="input-group">
            <label for="high">أعلى قمة (High)</label>
            <input type="number" id="high" placeholder="أدخل أعلى سعر للقمة">
        </div>

        <div class="input-group">
            <label for="low">أدنى قاع (Low)</label>
            <input type="number" id="low" placeholder="أدخل أدنى سعر للقاع">
        </div>

        <div class="input-group">
            <label for="current">السعر الحالي (Current Price)</label>
            <input type="number" id="current" placeholder="أدخل السعر الحالي">
        </div>

        <button id="calculate-btn">احسب مستويات فيبوناتشي</button>

        <div id="results-container" class="results">
            <!-- النتائج ستظهر هنا -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
